<!-- 加载 Mermaid 库 -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

<!-- 初始化 Mermaid -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ theme: 'default' });
        }
    });
</script>

<!-- 渲染图表 -->
<div class="mermaid">
    {{ .Inner | safeHTML }}
</div>
